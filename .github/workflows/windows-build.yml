name: build-windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm -v

      - name: Install dependencies
        shell: pwsh
        run: |
          pnpm install --no-frozen-lockfile

      - name: Build license generator exe
        shell: pwsh
        run: |
          pnpm --filter license-gen build:exe

      - name: Build desktop installer
        shell: pwsh
        run: |
          pnpm --filter desktop build:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aurora-union-windows-artifacts
          path: |
            apps/license-gen/dist/AuroraLicenseGen.exe
            apps/desktop/dist/*Setup*.exe
            apps/desktop/dist/latest.yml
            apps/desktop/dist/builder-effective-config.yaml