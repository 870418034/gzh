services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: aurora
    ports:
      - "5432:5432"
    volumes:
      - aurora_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - aurora_redis:/data

volumes:
  aurora_pg:
  aurora_redis:
